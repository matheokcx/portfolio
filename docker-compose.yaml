services:
  portfolio:
    build: .
    image: portfolio:latest
    container_name: portfolio
    ports:
      - "127.0.0.1:8080:3000"
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "--quiet", "--spider", "http://localhost:3000/"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 5s
