<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 400" fill="none">
  <defs>
    <linearGradient id="bgGrad" x1="0" y1="0" x2="400" y2="400" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="hsl(225, 40%, 12%)"/>
      <stop offset="100%" stop-color="hsl(225, 50%, 6%)"/>
    </linearGradient>
    <linearGradient id="accentGrad" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="hsl(220, 80%, 60%)"/>
      <stop offset="100%" stop-color="hsl(260, 70%, 55%)"/>
    </linearGradient>
    <linearGradient id="termGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="hsl(225, 30%, 14%)"/>
      <stop offset="100%" stop-color="hsl(225, 35%, 8%)"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="8" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <filter id="softGlow">
      <feGaussianBlur stdDeviation="20" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="400" height="400" rx="24" fill="url(#bgGrad)"/>

  <!-- Subtle grid -->
  <line x1="80" y1="0" x2="80" y2="400" stroke="hsla(220, 40%, 30%, 0.06)" stroke-width="1"/>
  <line x1="160" y1="0" x2="160" y2="400" stroke="hsla(220, 40%, 30%, 0.06)" stroke-width="1"/>
  <line x1="240" y1="0" x2="240" y2="400" stroke="hsla(220, 40%, 30%, 0.06)" stroke-width="1"/>
  <line x1="320" y1="0" x2="320" y2="400" stroke="hsla(220, 40%, 30%, 0.06)" stroke-width="1"/>
  <line x1="0" y1="80" x2="400" y2="80" stroke="hsla(220, 40%, 30%, 0.06)" stroke-width="1"/>
  <line x1="0" y1="160" x2="400" y2="160" stroke="hsla(220, 40%, 30%, 0.06)" stroke-width="1"/>
  <line x1="0" y1="240" x2="400" y2="240" stroke="hsla(220, 40%, 30%, 0.06)" stroke-width="1"/>
  <line x1="0" y1="320" x2="400" y2="320" stroke="hsla(220, 40%, 30%, 0.06)" stroke-width="1"/>

  <!-- Ambient glow -->
  <circle cx="200" cy="180" r="100" fill="hsla(220, 80%, 50%, 0.06)" filter="url(#softGlow)"/>

  <!-- Terminal window -->
  <rect x="50" y="60" width="300" height="200" rx="12" fill="url(#termGrad)" stroke="hsla(220, 40%, 30%, 0.3)" stroke-width="1"/>

  <!-- Terminal title bar -->
  <rect x="50" y="60" width="300" height="32" rx="12" fill="hsla(220, 30%, 16%, 0.8)"/>
  <rect x="50" y="80" width="300" height="12" fill="hsla(220, 30%, 16%, 0.8)"/>
  <circle cx="72" cy="76" r="5" fill="hsl(0, 65%, 55%)"/>
  <circle cx="90" cy="76" r="5" fill="hsl(45, 65%, 55%)"/>
  <circle cx="108" cy="76" r="5" fill="hsl(130, 55%, 45%)"/>

  <!-- Code lines -->
  <rect x="70" y="105" width="16" height="3" rx="1.5" fill="hsl(260, 60%, 60%)" opacity="0.9"/>
  <rect x="90" y="105" width="50" height="3" rx="1.5" fill="hsl(220, 80%, 65%)" opacity="0.7"/>
  <rect x="145" y="105" width="30" height="3" rx="1.5" fill="hsla(220, 20%, 60%, 0.4)"/>

  <rect x="82" y="117" width="40" height="3" rx="1.5" fill="hsl(170, 60%, 50%)" opacity="0.8"/>
  <rect x="127" y="117" width="22" height="3" rx="1.5" fill="hsla(220, 20%, 60%, 0.4)"/>
  <rect x="154" y="117" width="55" height="3" rx="1.5" fill="hsl(35, 70%, 60%)" opacity="0.7"/>

  <rect x="82" y="129" width="28" height="3" rx="1.5" fill="hsl(220, 80%, 65%)" opacity="0.7"/>
  <rect x="115" y="129" width="45" height="3" rx="1.5" fill="hsla(220, 20%, 60%, 0.4)"/>

  <rect x="94" y="141" width="60" height="3" rx="1.5" fill="hsl(340, 60%, 60%)" opacity="0.7"/>
  <rect x="160" y="141" width="35" height="3" rx="1.5" fill="hsl(170, 60%, 50%)" opacity="0.6"/>

  <rect x="94" y="153" width="20" height="3" rx="1.5" fill="hsl(260, 60%, 60%)" opacity="0.8"/>
  <rect x="119" y="153" width="70" height="3" rx="1.5" fill="hsla(220, 20%, 60%, 0.3)"/>

  <rect x="82" y="165" width="35" height="3" rx="1.5" fill="hsl(170, 60%, 50%)" opacity="0.7"/>

  <rect x="70" y="177" width="16" height="3" rx="1.5" fill="hsl(260, 60%, 60%)" opacity="0.9"/>

  <!-- Blinking cursor -->
  <rect x="70" y="193" width="8" height="12" rx="1" fill="url(#accentGrad)" opacity="0.9" filter="url(#glow)">
    <animate attributeName="opacity" values="0.9;0.2;0.9" dur="1.2s" repeatCount="indefinite"/>
  </rect>

  <!-- Floating elements - React-like orbit -->
  <g transform="translate(310, 310)">
    <circle cx="0" cy="0" r="40" fill="none" stroke="hsla(220, 60%, 50%, 0.15)" stroke-width="1"/>
    <circle cx="0" cy="0" r="24" fill="none" stroke="hsla(220, 60%, 50%, 0.1)" stroke-width="1"/>
    <ellipse cx="0" cy="0" rx="40" ry="16" fill="none" stroke="hsla(220, 80%, 60%, 0.25)" stroke-width="1.2" transform="rotate(-30)"/>
    <ellipse cx="0" cy="0" rx="40" ry="16" fill="none" stroke="hsla(220, 80%, 60%, 0.25)" stroke-width="1.2" transform="rotate(30)"/>
    <ellipse cx="0" cy="0" rx="40" ry="16" fill="none" stroke="hsla(220, 80%, 60%, 0.25)" stroke-width="1.2" transform="rotate(90)"/>
    <circle cx="0" cy="0" r="5" fill="url(#accentGrad)" filter="url(#glow)"/>
  </g>

  <!-- Decorative brackets -->
  <text x="52" y="340" font-family="monospace" font-size="48" font-weight="700" fill="url(#accentGrad)" opacity="0.15">{</text>
  <text x="330" y="340" font-family="monospace" font-size="48" font-weight="700" fill="url(#accentGrad)" opacity="0.15">}</text>

  <!-- Small floating dots -->
  <circle cx="55" cy="300" r="2" fill="hsl(220, 80%, 60%)" opacity="0.3"/>
  <circle cx="340" cy="55" r="2" fill="hsl(220, 80%, 60%)" opacity="0.25"/>
  <circle cx="360" cy="140" r="1.5" fill="hsl(260, 60%, 60%)" opacity="0.3"/>
  <circle cx="38" cy="170" r="1.5" fill="hsl(170, 60%, 50%)" opacity="0.25"/>
</svg>
