name: CD - Deploy

on:
  push:
    branches: [main]
  workflow_dispatch:

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}

jobs:
  build-and-push:
    name: Build & push Docker image
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    outputs:
      image: ${{ steps.image.outputs.ref }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract image metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=ref,event=branch
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=sha,format=short
            type=raw,value=latest,enable={{is_default_branch}}

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Compute deploy image ref (lowercase, sha-pinned)
        id: image
        run: echo "ref=${REGISTRY}/${IMAGE_NAME,,}:sha-$(git rev-parse --short HEAD)" >> "$GITHUB_OUTPUT"

  deploy:
    name: Deploy to VPS
    needs: build-and-push
    runs-on: ubuntu-latest

    steps:
      - name: Check required secrets are present
        env:
          VPS_HOST: ${{ secrets.VPS_HOST }}
          VPS_USER: ${{ secrets.VPS_USER }}
          VPS_SSH_KEY: ${{ secrets.VPS_SSH_KEY }}
          VPS_PORT: ${{ secrets.VPS_PORT }}
          GHCR_TOKEN: ${{ secrets.GHCR_TOKEN }}
        run: |
          missing=0
          for name in VPS_HOST VPS_USER VPS_SSH_KEY VPS_PORT GHCR_TOKEN; do
            val="${!name}"
            if [ -z "$val" ]; then
              echo "::error::Secret $name is EMPTY or not set"
              missing=1
            else
              echo "$name: set (value length ${#val})"
            fi
          done
          echo "VPS_SSH_KEY length: ${#VPS_SSH_KEY}"
          echo "VPS_SSH_KEY first line: $(printf '%s' "$VPS_SSH_KEY" | head -n1)"
          echo "VPS_SSH_KEY last line: $(printf '%s' "$VPS_SSH_KEY" | tail -n1)"
          if [ "$missing" != "0" ]; then
            echo "::error::One or more required secrets are missing. Fix them in Settings > Secrets and variables > Actions (repository secrets)."
            exit 1
          fi

      - name: Pull & run image on the VPS over SSH
        uses: appleboy/ssh-action@v1
        env:
          IMAGE: ${{ needs.build-and-push.outputs.image }}
          APP_PORT: ${{ vars.APP_PORT || '8080' }}
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          port: ${{ secrets.VPS_PORT }}
          envs: IMAGE,APP_PORT
          script: |
            set -e
            echo "${{ secrets.GHCR_TOKEN }}" | docker login ${{ env.REGISTRY }} -u ${{ github.actor }} --password-stdin
            docker pull "$IMAGE"
            docker rm -f portfolio 2>/dev/null || true
            docker run -d \
              --name portfolio \
              --restart unless-stopped \
              -p 127.0.0.1:${APP_PORT}:3000 \
              "$IMAGE"
            docker image prune -f
